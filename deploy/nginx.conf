# kanle Nginx 反向代理配置示例
#
# 使用方法：
# 1. 复制到 /etc/nginx/conf.d/yourdomain.conf
# 2. 将 yourdomain.com 替换为你的真实域名
# 3. 用 certbot 申请 SSL 证书: sudo certbot --nginx -d yourdomain.com
#
# 只需反代 3000，/api/ 和 /uploads/ 由 Next.js rewrites 自动代理到后端

server {
    listen 80;
    server_name yourdomain.com;

    # 上传文件大小限制
    client_max_body_size 25m;

    # 所有请求代理到前端（/api/ 和 /uploads/ 由 Next.js rewrites 处理）
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
