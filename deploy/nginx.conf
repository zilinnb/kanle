# kanle Nginx 反向代理配置
#
# 使用方法：
# 1. 复制到 /etc/nginx/conf.d/yourdomain.conf（或宝塔面板站点配置文件中）
# 2. 将 yourdomain.com 替换为你的真实域名
# 3. 将 /opt/kanle 替换为你的实际安装路径
# 4. 用 certbot 申请 SSL 证书: sudo certbot --nginx -d yourdomain.com
#
# 端口说明：
# - 前端运行在 3000（对应 ecosystem.config.js 中的 PORT）
# - 后端运行在 4000（对应 backend/.env 中的 PORT）
# - /api/ 和 /uploads/ 由 Nginx 直接反代到后端（不经过 Next.js）

server {
    listen 80;
    server_name yourdomain.com;

    client_max_body_size 100m;

    # ===== Next.js 静态资源（^~ 跳过后续正则匹配，直连前端）=====
    location ^~ /_next/static/ {
        proxy_pass http://127.0.0.1:3000/_next/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        access_log off;
    }

    # ===== 表情图片：Nginx 直接服务静态文件 =====
    location ^~ /emoji/ {
        alias /opt/kanle/frontend/public/emoji/;
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # ===== 字体文件：Nginx 直接服务静态文件 =====
    location ^~ /fonts/ {
        alias /opt/kanle/frontend/public/fonts/;
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # ===== 上传文件：Nginx 直接服务静态文件 =====
    location ^~ /uploads/ {
        alias /opt/kanle/backend/public/uploads/;
        expires 30d;
        access_log off;
    }

    # ===== 后端 API 反代 =====
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 100m;
    }

    # ===== 前端 Next.js 反代 =====
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
