services:
  mysql:
    # 支持 5.7 或 8.0，通过 .env 中 MYSQL_VERSION 切换
    image: mysql:${MYSQL_VERSION:-8.0}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-moment_blog}
      MYSQL_USER: ${DB_USER:-kanle}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    # 镜像标签：latest（稳定版）| dev（开发版）
    image: zilinnb/kanle-backend:latest
    # 如需从源码构建：注释掉 image，取消下面 build 的注释
    # build: ./backend
    container_name: kanle-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-kanle}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      DB_NAME: ${DB_NAME:-moment_blog}
      JWT_SECRET: ${JWT_SECRET:-please-change-me}
      JWT_EXPIRES_IN: 7d
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@kanle.net}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-123456}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      # revalidate 回调地址（Docker 内部，后端→前端）
      CLIENT_URL: http://kanle-frontend:3000
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-kanle-revalidate}
    volumes:
      - backend-uploads:/app/backend/public/uploads
      - backend-plugins:/app/backend/plugins
    depends_on:
      mysql:
        condition: service_healthy
    # 不暴露 4000 端口：通过前端 Next.js rewrites 代理 /api/ 和 /uploads/
    restart: unless-stopped

  frontend:
    # 镜像标签：latest（稳定版）| dev（开发版）
    image: zilinnb/kanle-frontend:latest
    container_name: kanle-frontend
    # 预构建镜像已内置 NEXT_PUBLIC_API_URL=/api + BACKEND_URL=http://kanle-backend:4000
    # 任何 IP/域名都能用，无需从源码构建
    # 如需自定义（如改后端容器名或设置站点 URL）：注释掉 image，取消下面 build 的注释
    # build:
    #   context: ./frontend
    #   args:
    #     BACKEND_URL: http://kanle-backend:4000
    #     NEXT_PUBLIC_SITE_URL: https://yourdomain.com  # 可选，用于 Cravatar 默认头像
    environment:
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-kanle-revalidate}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  mysql-data:
  backend-uploads:
  backend-plugins:
